# Dungeon Siege OpenGL Model Viewer configuration
#
# Copy this file to viewer.properties and edit the paths for your local machine.
# Dungeon Siege game assets and NamingKey files are intentionally not included
# in this repository.

# Root folder that contains the installed/extracted Dungeon Siege data.
dungeonSiege.dataRoot=D:/data/dungeon-siege

# Root folder for extracted art assets.
dungeonSiege.artRoot=D:/data/dungeon-siege/art

# Local NamingKey file. This file is game data and should not be committed.
dungeonSiege.namingKeyPath=D:/data/dungeon-siege/art/namingkey101.nnk

# Fallback resource roots used when a short name is not resolved by NamingKey.
resources.modelBasePath=D:/data/dungeon-siege/art/meshes
resources.animationBasePath=D:/data/dungeon-siege/art/animations
resources.textureBasePath=D:/data/dungeon-siege/art/bitmaps

# Startup assets. These can be short NamingKey names or explicit paths.
viewer.model=m_c_ebb_dg_pos_1
viewer.animation=a_c_ebb_dg_fs0_at

# Startup options.
viewer.debugLogging=false
viewer.startWireframe=false
viewer.startPaused=false
viewer.startRotating=false
