# Copy this file to viewer.ini and edit the paths for your local machine.
# Dungeon Siege game data and NamingKey files are not included in this repository.

[DungeonSiege]
# Root folder that contains the local Dungeon Siege data extraction.
DataRoot=D:/data/dungeon-siege

# Usually DataRoot/art.
ArtRoot=D:/data/dungeon-siege/art

# Local path to your own NamingKey file. Do not commit this file.
NamingKeyPath=D:/data/dungeon-siege/namingkey101.nnk

[Resources]
# These are fallback search paths. NamingKey lookup is tried first when available.
ModelBasePath=D:/data/dungeon-siege/art/meshes
AnimationBasePath=D:/data/dungeon-siege/art/animations
TextureBasePath=D:/data/dungeon-siege/art/bitmaps

[Viewer]
# Names can omit extensions. NamingKey lookup lets short names resolve to full asset paths.
Model=m_c_ebb_dg_pos_1
Animation=a_c_ebb_dg_fs0_at

DebugLogging=false
StartWireframe=false
StartPaused=false
StartRotating=false
